<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <circle cx="150" cy="100" r="120" fill="#7c3aed" opacity="0.08"/>
  <circle cx="680" cy="350" r="140" fill="#06b6d4" opacity="0.08"/>

  <!-- Top bar (editor chrome) -->
  <rect x="60" y="60" width="680" height="330" rx="12" fill="#13131f" stroke="#2a2a3e" stroke-width="1.5"/>
  <rect x="60" y="60" width="680" height="36" rx="12" fill="#1e1e2e"/>
  <rect x="60" y="84" width="680" height="12" fill="#1e1e2e"/>
  <!-- Dots -->
  <circle cx="88" cy="78" r="6" fill="#ff5f57"/>
  <circle cx="108" cy="78" r="6" fill="#febc2e"/>
  <circle cx="128" cy="78" r="6" fill="#28c840"/>
  <!-- Title bar -->
  <text x="400" y="83" text-anchor="middle" font-family="monospace" font-size="13" fill="#6b7280">SnipVault — snippet manager</text>

  <!-- Sidebar -->
  <rect x="60" y="96" width="170" height="294" fill="#0f0f1a" rx="0"/>
  <rect x="230" y="96" width="1.5" height="294" fill="#2a2a3e"/>

  <!-- Sidebar items -->
  <rect x="75" y="115" width="140" height="28" rx="6" fill="#7c3aed" opacity="0.25"/>
  <text x="92" y="134" font-family="monospace" font-size="11" fill="#a78bfa">⭐ Favoritos</text>

  <text x="92" y="165" font-family="monospace" font-size="11" fill="#6b7280">🐍 Python</text>
  <text x="92" y="188" font-family="monospace" font-size="11" fill="#6b7280">⚛️  React</text>
  <text x="92" y="211" font-family="monospace" font-size="11" fill="#6b7280">🔷 TypeScript</text>
  <text x="92" y="234" font-family="monospace" font-size="11" fill="#6b7280">☕ Java</text>
  <text x="92" y="257" font-family="monospace" font-size="11" fill="#6b7280">🐘 SQL</text>

  <!-- Tags label -->
  <text x="92" y="295" font-family="monospace" font-size="10" fill="#4b5563">ETIQUETAS</text>
  <rect x="92" y="305" width="50" height="16" rx="8" fill="#1e3a4a"/>
  <text x="117" y="317" text-anchor="middle" font-family="monospace" font-size="9" fill="#06b6d4">api</text>
  <rect x="150" y="305" width="55" height="16" rx="8" fill="#2d1b4e"/>
  <text x="177" y="317" text-anchor="middle" font-family="monospace" font-size="9" fill="#a78bfa">hooks</text>
  <rect x="92" y="328" width="60" height="16" rx="8" fill="#1a2e1a"/>
  <text x="122" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ade80">utils</text>

  <!-- Main content: snippet cards -->
  <!-- Card 1 -->
  <rect x="245" y="108" width="480" height="85" rx="8" fill="#1e1e2e" stroke="#2a2a3e" stroke-width="1"/>
  <rect x="245" y="108" width="4" height="85" rx="2" fill="url(#accent)"/>
  <text x="262" y="128" font-family="monospace" font-size="12" fill="#e2e8f0" font-weight="bold">JWT Auth middleware (FastAPI)</text>
  <rect x="262" y="135" width="55" height="14" rx="7" fill="#1a2e4a"/>
  <text x="289" y="146" text-anchor="middle" font-family="monospace" font-size="9" fill="#38bdf8">Python</text>
  <rect x="324" y="135" width="35" height="14" rx="7" fill="#2d1b4e"/>
  <text x="341" y="146" text-anchor="middle" font-family="monospace" font-size="9" fill="#a78bfa">auth</text>
  <text x="262" y="168" font-family="monospace" font-size="10" fill="#4b5563">def get_current_user(token: str = Depends(oauth2_scheme))...</text>
  <text x="680" y="128" font-family="monospace" font-size="14" fill="#4b5563">⭐</text>
  <text x="700" y="128" font-family="monospace" font-size="12" fill="#374151">⎘</text>

  <!-- Card 2 (highlighted) -->
  <rect x="245" y="203" width="480" height="85" rx="8" fill="#1e1e2e" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="245" y="203" width="4" height="85" rx="2" fill="#7c3aed"/>
  <text x="262" y="223" font-family="monospace" font-size="12" fill="#e2e8f0" font-weight="bold">useLocalStorage hook</text>
  <rect x="262" y="230" width="65" height="14" rx="7" fill="#1e3a1e"/>
  <text x="294" y="241" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ade80">TypeScript</text>
  <rect x="334" y="230" width="40" height="14" rx="7" fill="#1a2e1a"/>
  <text x="354" y="241" text-anchor="middle" font-family="monospace" font-size="9" fill="#86efac">hooks</text>
  <text x="262" y="263" font-family="monospace" font-size="10" fill="#4b5563">const [value, setValue] = useLocalStorage&lt;T&gt;(key, initial)...</text>
  <text x="680" y="223" font-family="monospace" font-size="14" fill="#f59e0b">⭐</text>

  <!-- Card 3 -->
  <rect x="245" y="298" width="480" height="85" rx="8" fill="#1e1e2e" stroke="#2a2a3e" stroke-width="1"/>
  <rect x="245" y="298" width="4" height="85" rx="2" fill="#06b6d4"/>
  <text x="262" y="318" font-family="monospace" font-size="12" fill="#e2e8f0" font-weight="bold">Docker Compose stack completo</text>
  <rect x="262" y="325" width="45" height="14" rx="7" fill="#1a2d2e"/>
  <text x="284" y="336" text-anchor="middle" font-family="monospace" font-size="9" fill="#22d3ee">Docker</text>
  <rect x="314" y="325" width="40" height="14" rx="7" fill="#2a1a1a"/>
  <text x="334" y="336" text-anchor="middle" font-family="monospace" font-size="9" fill="#f87171">infra</text>
  <text x="262" y="358" font-family="monospace" font-size="10" fill="#4b5563">services: frontend, backend, db (postgres)...</text>

  <!-- Search bar top right -->
  <rect x="440" y="112" width="160" height="24" rx="12" fill="#0f0f1a" stroke="#2a2a3e" stroke-width="1"/>
  <text x="452" y="128" font-family="monospace" font-size="10" fill="#4b5563">🔍 Buscar snippets...</text>

  <!-- Logo / brand -->
  <text x="400" y="418" text-anchor="middle" font-family="monospace" font-size="15" fill="url(#accent)" filter="url(#glow)" font-weight="bold">🦭 SnipVault</text>
  <text x="400" y="436" text-anchor="middle" font-family="monospace" font-size="10" fill="#4b5563">FastAPI · React · TypeScript · JWT · Docker</text>
</svg>
