<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnipVault — Demo</title>
    <link rel="stylesheet" href="css/styles.css?v=3.8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: var(--bg-primary, #0a0a14); min-height: 100vh; padding: 2rem 1rem; }
        .demo-page-header { text-align: center; margin-bottom: 2rem; }
        .demo-page-header h1 { font-size: 1.8rem; color: #e2e8f0; margin-bottom: .5rem; }
        .demo-page-header p { color: #6b7280; font-size: .9rem; }
        .demo-page-header .back-link { display: inline-flex; align-items: center; gap: .4rem; color: #a78bfa; text-decoration: none; font-size: .85rem; margin-bottom: 1.5rem; }
        .demo-page-header .back-link:hover { color: #c4b5fd; }
        .demo-container { max-width: 700px; margin: 0 auto; }
    </style>
</head>
<body>
<div class="demo-container">
    <div class="demo-page-header">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver al portfolio</a>
        <h1>🦭 SnipVault</h1>
        <p>Demo simulada · Inicia sesión con cualquier usuario y contraseña</p>
    </div>
    <div class="sv-auth-panel" id="sv-auth-panel">
        <div class="sv-tabs">
            <button class="sv-tab active" data-tab="login">Iniciar sesión</button>
            <button class="sv-tab" data-tab="register">Registrarse</button>
        </div>
        <div class="sv-tab-content" id="sv-tab-login">
            <input class="sv-input" id="sv-login-user" placeholder="Usuario" autocomplete="off" spellcheck="false">
            <input class="sv-input" id="sv-login-pass" placeholder="Contraseña" type="password">
            <button class="btn-primary sv-btn" id="sv-login-btn"><i class="fas fa-sign-in-alt"></i> Entrar</button>
            <p class="sv-hint">Demo simulada · cualquier usuario/contraseña funciona</p>
        </div>
        <div class="sv-tab-content hidden" id="sv-tab-register">
            <input class="sv-input" id="sv-reg-user" placeholder="Elige un usuario" autocomplete="off" spellcheck="false">
            <input class="sv-input" id="sv-reg-pass" placeholder="Contraseña" type="password">
            <button class="btn-primary sv-btn" id="sv-reg-btn"><i class="fas fa-user-plus"></i> Crear cuenta</button>
        </div>
        <div id="sv-auth-msg" class="sv-msg" aria-live="polite"></div>
    </div>
    <div class="sv-app-panel hidden" id="sv-app-panel">
        <div class="sv-app-header">
            <span id="sv-welcome" class="sv-welcome">🦭 Bienvenido</span>
            <div class="sv-header-actions">
                <input class="sv-input sv-search" id="sv-search" placeholder="🔍 Buscar snippets…" autocomplete="off" spellcheck="false">
                <button class="btn-outline sv-btn-sm" id="sv-logout-btn">Salir</button>
            </div>
        </div>
        <div class="sv-new-form">
            <div class="sv-form-row">
                <input class="sv-input" id="sv-new-title" placeholder="Título del snippet" autocomplete="off" spellcheck="false">
                <select class="sv-input sv-select" id="sv-new-lang">
                    <option value="">Lenguaje</option>
                    <option>Python</option><option>JavaScript</option><option>TypeScript</option>
                    <option>Java</option><option>SQL</option><option>Bash</option><option>HTML</option><option>CSS</option><option>Otro</option>
                </select>
            </div>
            <textarea class="sv-input sv-textarea" id="sv-new-code" placeholder="Pega tu código aquí…" spellcheck="false"></textarea>
            <div class="sv-form-row">
                <input class="sv-input" id="sv-new-tags" placeholder="Etiquetas (ej: api, utils)" autocomplete="off" spellcheck="false">
                <button class="btn-primary sv-btn-sm" id="sv-save-btn"><i class="fas fa-save"></i> Guardar</button>
            </div>
            <div id="sv-save-msg" class="sv-msg" aria-live="polite"></div>
        </div>
        <div id="sv-snippets-list" class="sv-snippets-list" aria-live="polite"></div>
    </div>
</div>
<script src="js/extras.js"></script>
</body>
</html>
