<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Gramola Virtual — Demo</title>
    <link rel="stylesheet" href="css/styles.css?v=3.8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: var(--bg-primary, #0a0a14); min-height: 100vh; padding: 2rem 1rem; }
        .demo-page-header { text-align: center; margin-bottom: 2rem; }
        .demo-page-header h1 { font-size: 1.8rem; color: #e2e8f0; margin-bottom: .5rem; }
        .demo-page-header p { color: #6b7280; font-size: .9rem; }
        .demo-page-header .back-link { display: inline-flex; align-items: center; gap: .4rem; color: #a78bfa; text-decoration: none; font-size: .85rem; margin-bottom: 1.5rem; }
        .demo-page-header .back-link:hover { color: #c4b5fd; }
        .demo-container { max-width: 900px; margin: 0 auto; }
    </style>
</head>
<body>
<div class="demo-container">
    <div class="demo-page-header">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver al portfolio</a>
        <h1>🎵 La Gramola Virtual</h1>
        <p>Demo interactiva · Busca canciones, añádelas con tokens y escúchalas</p>
    </div>
    <div class="gramola-wrapper">
        <div class="gramola-queue-panel">
            <div class="gramola-header">
                <span class="gramola-bar-name">🍺 Bar El Spheal</span>
                <span class="gramola-tokens" id="gr-tokens">🪙 3 tokens</span>
            </div>
            <div class="gramola-search-row">
                <input class="sv-input" id="gr-search" placeholder="Ej: rosalia, bad bunny, taylor…" autocomplete="off" spellcheck="false">
                <button class="btn-primary sv-btn-sm" id="gr-search-btn"><i class="fas fa-search"></i></button>
            </div>
            <div id="gr-results" class="gr-results"></div>
            <div class="gramola-queue">
                <h4 class="gr-queue-title">Cola de reproducción</h4>
                <div id="gr-queue" class="gr-queue-list" aria-live="polite"></div>
            </div>
        </div>
        <div class="gramola-player-panel">
            <div class="gramola-now-playing" id="gr-now-playing">
                <div class="gr-vinyl" id="gr-vinyl">🎵</div>
                <div class="gr-song-info">
                    <p class="gr-song-title" id="gr-song-title">Esperando canción…</p>
                    <p class="gr-song-artist" id="gr-song-artist">—</p>
                </div>
            </div>
            <div class="gr-progress-bar"><div class="gr-progress-fill" id="gr-progress"></div></div>
            <div class="gr-controls">
                <button class="sv-icon-btn" id="gr-skip-btn" title="Saltar"><i class="fas fa-forward"></i></button>
                <button class="btn-primary sv-btn-sm" id="gr-play-btn"><i class="fas fa-play"></i> Reproducir</button>
            </div>
            <p class="sv-hint" style="margin-top:1rem">Añade canciones con tus tokens · cada una cuesta 1 🪙</p>
        </div>
    </div>
</div>
<script src="js/extras.js"></script>
</body>
</html>
