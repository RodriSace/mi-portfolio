<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify to Vinyl — Demo</title>
    <link rel="stylesheet" href="css/styles.css?v=3.8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: var(--bg-primary, #0a0a14); min-height: 100vh; padding: 2rem 1rem; }
        .demo-page-header { text-align: center; margin-bottom: 2rem; }
        .demo-page-header h1 { font-size: 1.8rem; color: #e2e8f0; margin-bottom: .5rem; }
        .demo-page-header p { color: #6b7280; font-size: .9rem; }
        .demo-page-header .back-link { display: inline-flex; align-items: center; gap: .4rem; color: #a78bfa; text-decoration: none; font-size: .85rem; margin-bottom: 1.5rem; }
        .demo-page-header .back-link:hover { color: #c4b5fd; }
        .demo-container { max-width: 800px; margin: 0 auto; }
    </style>
</head>
<body>
<div class="demo-container">
    <div class="demo-page-header">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver al portfolio</a>
        <h1>🎵 Spotify to Vinyl — Buscador Musical</h1>
        <p>Demo simulada · Busca artistas, álbumes y canciones (ej: rosalia, harry styles, counting stars…)</p>
    </div>
    <div class="isi-wrapper">
        <div class="isi-search-bar">
            <input class="sv-input" id="isi-search" placeholder="Ej: rosalia, harry styles, counting stars…" autocomplete="off" spellcheck="false">
            <select class="sv-input sv-select" id="isi-filter" style="width:140px;flex-shrink:0">
                <option value="all">Todo</option>
                <option value="artist">Artista</option>
                <option value="album">Álbum</option>
                <option value="track">Canción</option>
            </select>
            <button class="btn-primary sv-btn-sm" id="isi-search-btn"><i class="fas fa-search"></i> Buscar</button>
        </div>
        <div id="isi-results" class="isi-results" aria-live="polite">
            <p class="sv-empty">Introduce un término para buscar en la base de datos musical.</p>
        </div>
    </div>
</div>
<script src="js/extras.js"></script>
</body>
</html>
